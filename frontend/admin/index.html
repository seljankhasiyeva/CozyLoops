<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CozyLoops</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="admin-style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            CozyLoops<span>.</span> Admin
        </div>
        <ul class="nav-links">
            <li class="nav-item active">
                <a href="index.html">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="products.html">
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="orders.html">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Orders</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="customers.html">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
            </li>
            <li class="nav-item"><a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a></li>
            <li class="nav-item" style="margin-top: auto;">
                <a href="../index.html">
                    <i class="fas fa-external-link-alt"></i>
                    <span>View Site</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="admin-header">
            <div class="page-title">
                <h1>Dashboard Overview</h1>
                <p>Statistics and latest activities</p>
            </div>
            <div class="user-profile">
                <div class="user-info" style="text-align: right;">
                    <span style="display: block; font-weight: 600;">Admin User</span>
                    <span style="font-size: 0.8rem; color: #888;">Manager</span>
                </div>
                <div class="user-img">A</div>
            </div>
        </header>

        <!-- Stats Grid -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                <div class="stat-info">
                    <h3>Total Sales</h3>
                    <div class="value" id="stat-total-sales">$0.00</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-info">
                    <h3>Total Orders</h3>
                    <div class="value" id="stat-total-orders">0</div>

                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <h3>Total Customers</h3>
                    <div class="value" id="stat-total-customers">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="stat-info">
                    <h3>Conversion Rate</h3>
                    <div class="value">3.2%</div>
                </div>
            </div>
        </section>

        <!-- Sales Chart -->
        <section class="data-card" style="margin-bottom: 3rem;">
            <div class="card-header">
                <h2>Sales Analytics (Last Month)</h2>
                <div class="chart-legend">
                    <span style="font-size: 0.8rem; color: #888;"><i class="fas fa-circle"
                            style="color: var(--accent-color); margin-right: 5px;"></i> Revenue ($)</span>
                </div>
            </div>
            <div class="chart-container" style="position: relative; height:300px; width:100%">
                <canvas id="salesChart"></canvas>
            </div>
        </section>
    </main>

    <script src="../env.js"></script>
    <script src="admin-script.js"></script>
</body>

</html>
