<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Directory | CozyLoops Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="admin-style.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            CozyLoops<span>.</span> Admin
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="index.html">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="products.html">
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="orders.html">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Orders</span>
                </a>
            </li>
            <li class="nav-item active">
                <a href="customers.html">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
            </li>
            <li class="nav-item" style="margin-top: auto;">
                <a href="../index.html">
                    <i class="fas fa-external-link-alt"></i>
                    <span>View Site</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="admin-header">
            <div class="page-title">
                <h1>Customer Directory</h1>
                <p>Manage your community and customer relations</p>
            </div>
            <div class="header-actions">
                <button class="btn-primary">
                    <i class="fas fa-user-plus"></i>
                    Add Customer
                </button>
            </div>
        </header>

        <!-- Customers Table -->
        <section class="data-card">
            <div class="table-controls">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search by name or email...">
                </div>
                <div class="filters">
                    <select class="btn-action">
                        <option>Sort by: Newest</option>
                        <option>Order Count</option>
                        <option>Total Spent</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Total Orders</th>
                            <th>Total Spent</th>
                            <th>Last Order</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customers-table">
                        <!-- Content populated via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Customer Profile Modal -->
    <div id="customer-modal" class="modal">
        <div class="modal-content profile-card">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Content populated via JS -->
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>

</html>
